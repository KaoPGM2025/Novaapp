<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVASave 2026 V2.9</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0f2f5; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.3); }
        .nav-active { color: #2563eb; border-top: 3px solid #2563eb; }
        .rank-badge { padding: 4px 12px; border-radius: 999px; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
        .rank-bronze { background: #cd7f32; color: white; }
        .rank-silver { background: #c0c0c0; color: #333; }
        .rank-gold { background: #ffd700; color: #333; }
        .rank-platinum { background: #e5e4e2; color: #333; }
        .rank-diamond { background: #b9f2ff; color: #0081a7; }
        .rank-legend { background: linear-gradient(45deg, #6d28d9, #db2777); color: white; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body class="pb-20">

    <!-- Header / Profile Section -->
    <div class="bg-blue-600 text-white p-6 rounded-b-[3rem] shadow-lg mb-6">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div class="flex items-center space-x-4">
                <img id="profileImg" src="https://lh3.googleusercontent.com/a/default-user" alt="Profile" class="w-14 h-14 rounded-full border-2 border-white object-cover">
                <div>
                    <h2 id="userNameDisplay" class="text-xl font-bold">ผู้ใช้ทั่วไป</h2>
                    <div id="rankBadge" class="rank-badge rank-bronze">Bronze</div>
                </div>
            </div>
            <button onclick="switchTab('settings')" class="p-2 bg-white/20 rounded-full">
                <i data-lucide="settings"></i>
            </button>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="max-w-md mx-auto px-4">
        
        <!-- Tab: Dashboard -->
        <div id="dashboard-tab" class="tab-content space-y-4">
            <div class="glass-card p-6 shadow-sm">
                <p class="text-gray-500 text-sm">เงินออมทั้งหมด</p>
                <h1 id="totalSavings" class="text-4xl font-bold text-blue-600">฿0.00</h1>
            </div>

            <div class="glass-card p-6 shadow-sm">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium">เป้าหมาย: <span id="goalLabel">ยังไม่ตั้ง</span></span>
                    <span id="goalPercent" class="text-sm font-bold text-blue-600">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="goalProgressBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>

            <div class="glass-card p-4 shadow-sm">
                <h3 class="font-bold mb-2 flex items-center text-indigo-600">
                    <i data-lucide="bot" class="mr-2 w-5 h-5"></i> AI-Mali วิเคราะห์
                </h3>
                <p id="aiAnalysis" class="text-sm text-gray-600 italic">กำลังวิเคราะห์ข้อมูลการออมของคุณ...</p>
            </div>
        </div>

        <!-- Tab: Add Saving -->
        <div id="add-tab" class="tab-content hidden space-y-4">
            <div class="glass-card p-6">
                <h2 class="text-xl font-bold mb-4">เพิ่มการออม</h2>
                <form id="saveForm" class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">จำนวนเงิน (บาท)</label>
                        <input type="number" id="amount" required step="0.01" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">วันที่</label>
                        <input type="date" id="date" required class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">หมวดหมู่</label>
                        <select id="category" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="ทั่วไป">ทั่วไป</option>
                            <option value="ของใช้">ของใช้</option>
                            <option value="การศึกษา">การศึกษา</option>
                            <option value="ท่องเที่ยว">ท่องเที่ยว</option>
                            <option value="เกษียณ">เกษียณ</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">หมายเหตุ</label>
                        <textarea id="note" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" rows="2"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition">
                        บันทึกการออม
                    </button>
                </form>
            </div>
        </div>

        <!-- Tab: History -->
        <div id="history-tab" class="tab-content hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">ประวัติการออม</h2>
                <span class="text-xs text-gray-400">*ลบอัตโนมัติใน 24 ชม.</span>
            </div>
            <div id="historyList" class="space-y-3">
                <!-- Data dynamically inserted here -->
            </div>
        </div>

        <!-- Tab: Report -->
        <div id="report-tab" class="tab-content hidden space-y-4">
            <div class="glass-card p-4">
                <h2 class="text-xl font-bold mb-4">รายงานสถิติ</h2>
                <canvas id="savingChart" height="250"></canvas>
            </div>
            <div id="statsInfo" class="grid grid-cols-2 gap-4">
                <div class="glass-card p-4 text-center">
                    <p class="text-xs text-gray-500 uppercase">สูงสุดต่อวัน</p>
                    <p id="maxSaving" class="text-lg font-bold">฿0</p>
                </div>
                <div class="glass-card p-4 text-center">
                    <p class="text-xs text-gray-500 uppercase">เฉลี่ยต่อวัน</p>
                    <p id="avgSaving" class="text-lg font-bold">฿0</p>
                </div>
            </div>
        </div>

        <!-- Tab: Settings -->
        <div id="settings-tab" class="tab-content hidden space-y-4">
            <div class="glass-card p-6">
                <h2 class="text-xl font-bold mb-4">ตั้งค่าระบบ</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">ชื่อผู้ใช้</label>
                        <input type="text" id="settingName" class="w-full p-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">เป้าหมายการออม (บาท)</label>
                        <input type="number" id="settingGoal" class="w-full p-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">รูปโปรไฟล์ (URL)</label>
                        <input type="text" id="settingProfileUrl" placeholder="https://..." class="w-full p-2 border rounded-lg">
                        <div class="mt-2 flex space-x-2">
                           <button onclick="quickAvatar('https://lh3.googleusercontent.com/a/default-user')" class="text-[10px] bg-gray-200 px-2 py-1 rounded">Default</button>
                           <button onclick="quickAvatar('https://www.gstatic.com/images/branding/product/2x/avatar_square_blue_120dp.png')" class="text-[10px] bg-blue-100 px-2 py-1 rounded">Google Blue</button>
                        </div>
                    </div>
                    <hr>
                    <div class="flex flex-col space-y-2">
                        <button onclick="saveSettings()" class="bg-green-600 text-white py-2 rounded-lg font-bold">บันทึกตั้งค่า</button>
                        <button onclick="syncFromSheet()" class="bg-blue-500 text-white py-2 rounded-lg font-bold flex items-center justify-center">
                            <i data-lucide="refresh-cw" class="w-4 h-4 mr-2"></i> อัพเดต/ดึงข้อมูลเดิม
                        </button>
                        <button onclick="clearAllData()" class="bg-red-500 text-white py-2 rounded-lg font-bold">ล้างข้อมูลทั้งหมด</button>
                    </div>
                    <div class="text-center text-[10px] text-gray-400 mt-4">
                        NOVASave2026 V2.9 | Update: 20/03/2026
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-6 py-2 flex justify-between items-center max-w-md mx-auto shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('dashboard')" class="nav-btn flex flex-col items-center nav-active" data-tab="dashboard">
            <i data-lucide="home"></i>
            <span class="text-[10px]">หน้าหลัก</span>
        </button>
        <button onclick="switchTab('history')" class="nav-btn flex flex-col items-center text-gray-400" data-tab="history">
            <i data-lucide="list"></i>
            <span class="text-[10px]">ประวัติ</span>
        </button>
        <button onclick="switchTab('add')" class="bg-blue-600 text-white p-3 rounded-full -mt-8 shadow-xl">
            <i data-lucide="plus"></i>
        </button>
        <button onclick="switchTab('report')" class="nav-btn flex flex-col items-center text-gray-400" data-tab="report">
            <i data-lucide="bar-chart-2"></i>
            <span class="text-[10px]">รายงาน</span>
        </button>
        <button onclick="switchTab('settings')" class="nav-btn flex flex-col items-center text-gray-400" data-tab="settings">
            <i data-lucide="user"></i>
            <span class="text-[10px]">ตั้งค่า</span>
        </button>
    </nav>

    <script>
        // Configuration
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbySqb1Z1v8mVlxlehMOk7A5o5FIr4bpYPJSVOHKyQfE1QFl8PSzc55JjIlaciBsc5-w/exec';
        
        // State
        let state = {
            user: { name: 'ผู้ใช้นิรนาม', goal: 10000, profile: 'https://lh3.googleusercontent.com/a/default-user' },
            savings: [],
            total: 0
        };

        // Initialize
        window.onload = () => {
            lucide.createIcons();
            loadLocalStorage();
            updateUI();
            document.getElementById('date').valueAsDate = new Date();
            initChart();
        };

        // Local Storage
        function loadLocalStorage() {
            const savedState = localStorage.getItem('novasave_data');
            if (savedState) {
                state = JSON.parse(savedState);
                // Filter history older than 24 hours (but keep total amount)
                const now = new Date().getTime();
                state.savings = state.savings.filter(s => {
                    const savedTime = new Date(s.timestamp || s.date).getTime();
                    return (now - savedTime) < (24 * 60 * 60 * 1000);
                });
            }
            
            // Sync UI with settings inputs
            document.getElementById('settingName').value = state.user.name;
            document.getElementById('settingGoal').value = state.user.goal;
            document.getElementById('settingProfileUrl').value = state.user.profile;
        }

        function saveLocalStorage() {
            localStorage.setItem('novasave_data', JSON.stringify(state));
        }

        // Tabs Logic
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId + '-tab').classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('nav-active');
                btn.classList.add('text-gray-400');
                if(btn.getAttribute('data-tab') === tabId) {
                    btn.classList.add('nav-active');
                    btn.classList.remove('text-gray-400');
                }
            });
            
            if(tabId === 'report') renderChart();
            if(tabId === 'dashboard') updateAI();
        }

        // Form Submission (JSONP)
        document.getElementById('saveForm').onsubmit = function(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;
            const category = document.getElementById('category').value;
            const note = document.getElementById('note').value;

            const entry = {
                action: 'addSaving',
                name: state.user.name,
                amount: amount,
                date: date,
                category: category,
                note: note,
                timestamp: new Date().toISOString()
            };

            // SweetAlert Loading
            Swal.fire({
                title: 'กำลังบันทึก...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            // JSONP Submission
            const callbackName = 'jsonpCallback_' + Math.round(Math.random() * 1000000);
            window[callbackName] = function(response) {
                delete window[callbackName];
                document.body.removeChild(script);
                
                if (response.result === 'success') {
                    // Update Local State
                    state.savings.unshift(entry);
                    state.total += amount;
                    saveLocalStorage();
                    updateUI();
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'บันทึกสำเร็จ!',
                        timer: 1000,
                        showConfirmButton: false
                    }).then(() => {
                        document.getElementById('saveForm').reset();
                        document.getElementById('date').valueAsDate = new Date();
                        switchTab('dashboard');
                    });
                } else {
                    Swal.fire('Error', 'ไม่สามารถบันทึกได้', 'error');
                }
            };

            const script = document.createElement('script');
            const query = Object.keys(entry).map(k => `${encodeURIComponent(k)}=${encodeURIComponent(entry[k])}`).join('&');
            script.src = `${SCRIPT_URL}?${query}&callback=${callbackName}`;
            document.body.appendChild(script);
        };

        // UI Updates
        function updateUI() {
            document.getElementById('userNameDisplay').innerText = state.user.name;
            document.getElementById('profileImg').src = state.user.profile;
            document.getElementById('totalSavings').innerText = `฿${state.total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            
            // Goal Update
            const percent = Math.min((state.total / state.user.goal) * 100, 100);
            document.getElementById('goalLabel').innerText = `฿${state.user.goal.toLocaleString()}`;
            document.getElementById('goalPercent').innerText = `${Math.round(percent)}%`;
            document.getElementById('goalProgressBar').style.width = `${percent}%`;

            // Rank Update
            updateRank(state.total);
            
            // History Update
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            state.savings.forEach((s, idx) => {
                const item = document.createElement('div');
                item.className = 'glass-card p-4 flex justify-between items-center animate-fadeIn';
                item.innerHTML = `
                    <div>
                        <p class="font-bold">฿${s.amount.toLocaleString()}</p>
                        <p class="text-[10px] text-gray-400">${s.date} | ${s.category}</p>
                    </div>
                    <button onclick="deleteEntry(${idx})" class="text-red-400 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                `;
                historyList.appendChild(item);
            });
            lucide.createIcons();
            updateAI();
        }

        function updateRank(total) {
            const badge = document.getElementById('rankBadge');
            badge.className = 'rank-badge';
            if (total >= 100000) { badge.innerText = 'Legend'; badge.classList.add('rank-legend'); }
            else if (total >= 50000) { badge.innerText = 'Diamond'; badge.classList.add('rank-diamond'); }
            else if (total >= 20000) { badge.innerText = 'Platinum'; badge.classList.add('rank-platinum'); }
            else if (total >= 10000) { badge.innerText = 'Gold'; badge.classList.add('rank-gold'); }
            else if (total >= 5000) { badge.innerText = 'Silver'; badge.classList.add('rank-silver'); }
            else { badge.innerText = 'Bronze'; badge.classList.add('rank-bronze'); }
        }

        function updateAI() {
            const aiText = document.getElementById('aiAnalysis');
            if (state.total === 0) {
                aiText.innerText = "ยังไม่มีข้อมูลการออม เริ่มออมวันนี้เพื่ออนาคตที่ดีครับ!";
                return;
            }
            const dailyAvg = state.total / 30; // Rough calc
            if (state.total < state.user.goal * 0.2) {
                aiText.innerText = `AI-Mali: คุณเพิ่งเริ่มการออม สู้ๆ นะครับ! หากออมเฉลี่ยวันละ ฿100 คุณจะถึงเป้าหมายใน ${Math.round((state.user.goal - state.total)/100)} วัน`;
            } else if (state.total >= state.user.goal) {
                aiText.innerText = "AI-Mali: ยินดีด้วย! คุณบรรลุเป้าหมายแล้ว ลองตั้งเป้าหมายที่ใหญ่ขึ้นดูไหม?";
            } else {
                aiText.innerText = "AI-Mali: กราฟการออมของคุณดูดีมาก รักษาวินัยแบบนี้ต่อไปนะครับ!";
            }
        }

        // Settings
        function saveSettings() {
            state.user.name = document.getElementById('settingName').value;
            state.user.goal = parseFloat(document.getElementById('settingGoal').value) || 1000;
            state.user.profile = document.getElementById('settingProfileUrl').value;
            saveLocalStorage();
            updateUI();
            Swal.fire('สำเร็จ', 'บันทึกการตั้งค่าแล้ว', 'success');
        }

        function quickAvatar(url) {
            document.getElementById('settingProfileUrl').value = url;
        }

        function clearAllData() {
            Swal.fire({
                title: 'ยืนยันการล้างข้อมูล?',
                text: "ข้อมูลในเครื่องจะหายทั้งหมด แต่ข้อมูลใน Sheet ยังคงอยู่",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'ลบเลย'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('novasave_data');
                    location.reload();
                }
            });
        }

        // Sync from Sheet
        function syncFromSheet() {
            Swal.fire({
                title: 'กำลังดึงข้อมูล...',
                didOpen: () => { Swal.showLoading(); }
            });

            const callbackName = 'syncCallback_' + Math.round(Math.random() * 1000000);
            window[callbackName] = function(response) {
                delete window[callbackName];
                document.body.removeChild(script);
                
                if (response.result === 'success') {
                    // Update state with sheet data
                    state.total = response.totalSavings || 0;
                    // Note: In real app, we'd also fetch the last few entries
                    saveLocalStorage();
                    updateUI();
                    Swal.fire('อัพเดตแล้ว', 'ดึงยอดเงินสะสมจากระบบ Cloud สำเร็จ', 'success');
                }
            };

            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=getSummary&name=${encodeURIComponent(state.user.name)}&callback=${callbackName}`;
            document.body.appendChild(script);
        }

        // Charting
        let myChart;
        function initChart() {
            const ctx = document.getElementById('savingChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['อา.', 'จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.'],
                    datasets: [{
                        label: 'เงินออมล่าสุด',
                        data: [0, 0, 0, 0, 0, 0, 0],
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function renderChart() {
            // Mock data processing for the last 7 days from state.savings
            const days = ['อา.', 'จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.'];
            const data = [0, 0, 0, 0, 0, 0, 0];
            
            state.savings.forEach(s => {
                const d = new Date(s.date).getDay();
                data[d] += s.amount;
            });

            myChart.data.datasets[0].data = data;
            myChart.update();
            
            const max = Math.max(...data);
            const avg = data.reduce((a,b) => a+b, 0) / 7;
            document.getElementById('maxSaving').innerText = `฿${max.toLocaleString()}`;
            document.getElementById('avgSaving').innerText = `฿${Math.round(avg).toLocaleString()}`;
        }

        function deleteEntry(index) {
            const removed = state.savings.splice(index, 1);
            state.total -= removed[0].amount;
            saveLocalStorage();
            updateUI();
        }

    </script>
</body>
</html>
